<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MoneyFlow" />
  <link rel="manifest" href="manifest.json" />
  <title>MoneyFlow</title>
  <style>
    :root{--bg:#080d18;--panel:#111827cc;--card:#172033;--muted:#94a3b8;--text:#f8fafc;--line:#263244;--blue:#3b82f6;--purple:#8b5cf6;--green:#22c55e;--red:#ef4444;--orange:#f97316}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{max-width:100%;overflow-x:hidden}body{margin:0;background:radial-gradient(circle at top,#172554 0,#080d18 42%,#020617 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;min-height:100vh}button,input,select{font:inherit}input,select{display:block;width:100%;max-width:100%;min-width:0;background:#0f172a;border:1px solid var(--line);border-radius:16px;color:var(--text);padding:15px;outline:none}.app{width:100%;max-width:520px;margin:0 auto;min-height:100vh;padding:env(safe-area-inset-top) 16px calc(90px + env(safe-area-inset-bottom));overflow-x:hidden}.top{padding:24px 4px 14px}.title{display:flex;justify-content:space-between;align-items:center}.title h1{margin:0;font-size:25px;letter-spacing:-.5px}.pill{font-size:13px;color:#bfdbfe;background:#1d4ed84d;border:1px solid #60a5fa44;padding:8px 12px;border-radius:999px}.balance{margin-top:18px;padding:24px;border-radius:30px;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 22px 60px #0008;position:relative;overflow:hidden}.balance:after{content:"";position:absolute;right:-50px;top:-60px;width:180px;height:180px;border-radius:999px;background:#ffffff18}.label{color:#dbeafe;font-size:14px}.amount{font-size:46px;font-weight:800;letter-spacing:-2px;margin-top:6px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.stat{background:var(--panel);border:1px solid #ffffff12;border-radius:22px;padding:15px;backdrop-filter:blur(14px)}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}.section{margin-top:18px}.section h2{font-size:18px;margin:0 0 12px}.card{background:var(--panel);border:1px solid #ffffff12;border-radius:24px;padding:16px;backdrop-filter:blur(14px);overflow:hidden}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:#020617dd;backdrop-filter:blur(20px);border-top:1px solid #ffffff12}.tab{border:0;border-radius:18px;background:transparent;color:var(--muted);padding:10px 2px;font-size:12px}.tab.active{background:#1d4ed84d;color:white}.tab i{display:block;font-style:normal;font-size:20px;margin-bottom:2px}.row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:18px;background:#0f172a;margin-bottom:10px}.icon{width:42px;height:42px;border-radius:15px;display:grid;place-items:center;background:#1e293b;font-size:22px}.grow{flex:1;min-width:0}.grow b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.small{font-size:12px;color:var(--muted)}.money{font-weight:800}.green{color:var(--green)}.red{color:var(--red)}.orange{color:var(--orange)}.hidden{display:none}.seg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:100%;max-width:100%;overflow:hidden}.seg button{width:100%;max-width:100%;min-width:0}.seg button,.primary,.danger,.ghost{border:0;border-radius:16px;padding:14px 10px;color:white;font-weight:700;min-width:0}.seg button{background:#1e293b;font-size:clamp(12px,3.4vw,16px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.seg button.active{background:linear-gradient(135deg,var(--blue),var(--purple))}.primary{width:100%;background:linear-gradient(135deg,var(--blue),var(--purple));margin-top:8px}.danger{background:#7f1d1d}.ghost{background:#1e293b}.form{display:grid;gap:12px}.actions{display:flex;gap:8px}.actions button{flex:1}.bar{height:12px;background:#0f172a;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:999px}.empty{text-align:center;color:var(--muted);padding:34px 10px}.search{margin-bottom:12px}.mini{display:grid;grid-template-columns:1fr 1fr;gap:10px}.linkbtn{border:0;background:none;color:#93c5fd;font-weight:700}.toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%);background:#0f172a;border:1px solid #334155;color:white;padding:12px 16px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1}.muted{color:var(--muted)}
  @media (min-width:430px){.seg{grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.seg button{font-size:14px;padding:14px 8px}}
</style>
</head>
<body>
  <main class="app">
    <div class="top"><div class="title"><h1>💰 MoneyFlow</h1><button class="pill" id="currencyBtn">PKR</button></div><div class="balance"><div class="label">Available balance</div><div class="amount" id="balance">0</div><div class="small">Income - expenses - active loans</div></div></div>
    <div id="view-home"></div><div id="view-add" class="hidden"></div><div id="view-loans" class="hidden"></div><div id="view-reports" class="hidden"></div>
  </main>
  <nav class="tabs"><button class="tab active" data-tab="home"><i>🏠</i>Home</button><button class="tab" data-tab="add"><i>➕</i>Add</button><button class="tab" data-tab="loans"><i>🤝</i>Loans</button><button class="tab" data-tab="reports"><i>📊</i>Reports</button></nav><div class="toast" id="toast"></div>
<script>
const $=s=>document.querySelector(s);const fmt=n=>`${state.currency} ${Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0})}`;const today=()=>new Date().toISOString().slice(0,10);const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
let state=JSON.parse(localStorage.getItem('moneyflow-v2')||'null')||{currency:'PKR',transactions:[],loans:[]};
function save(){localStorage.setItem('moneyflow-v2',JSON.stringify(state));render()}function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1500)}
function totals(){let income=0,expense=0,lent=0,borrowed=0;state.transactions.forEach(t=>{if(t.type==='income')income+=+t.amount;if(t.type==='expense')expense+=+t.amount});state.loans.forEach(l=>{let rem=Math.max(0,+l.amount-(+l.paid||0));if(l.kind==='lent')lent+=rem;else borrowed+=rem});return{income,expense,lent,borrowed,balance:income-expense-lent+borrowed}}
function icon(c){return {food:'🍔',transport:'🚗',dhobi:'👕'other:'📌'}[c]||'💰'}
function setTab(tab){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));['home','add','loans','reports'].forEach(v=>$('#view-'+v).classList.toggle('hidden',v!==tab));render()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));$('#currencyBtn').onclick=()=>{let c=prompt('Currency label',state.currency);if(c){state.currency=c.toUpperCase().slice(0,5);save()}}
function render(){let t=totals();$('#balance').textContent=fmt(t.balance);$('#currencyBtn').textContent=state.currency;renderHome(t);renderAdd();renderLoans(t);renderReports(t)}
function renderHome(t){let recent=[...state.transactions].sort((a,b)=>b.created-a.created).slice(0,6);$('#view-home').innerHTML=`<div class="grid"><div class="stat"><b class="green">${fmt(t.income)}</b><span>Income</span></div><div class="stat"><b class="red">${fmt(t.expense)}</b><span>Spent</span></div><div class="stat"><b class="orange">${fmt(t.lent)}</b><span>Lent out</span></div></div><section class="section"><h2>Recent activity</h2><div class="card">${recent.length?recent.map(rowTx).join(''):'<div class="empty">No transactions yet. Tap Add.</div>'}</div></section>`}
function rowTx(x){let cls=x.type==='income'?'green':'red';return `<div class="row"><div class="icon">${icon(x.category)}</div><div class="grow"><b>${x.note||x.category}</b><div class="small">${x.date} • ${x.type}</div></div><div class="money ${cls}">${x.type==='income'?'+':'-'}${fmt(x.amount)}</div></div>`}
function renderAdd(){ $('#view-add').innerHTML=`<section class="section"><h2>Add transaction</h2><div class="card"><form class="form" id="txForm"><div class="seg"><button type="button" data-type="income" class="active">Income</button><button type="button" data-type="expense">Expense</button><button type="button" data-type="lent">Lend</button><button type="button" data-type="borrowed">Borrow</button></div><input id="amount" type="number" min="1" step="1" placeholder="Amount" required><select id="category"><option value="food">Food</option><option value="transport">Transport</option><option value="shopping">Shopping</option><option value="bills">Bills</option><option value="health">Health</option><option value="fun">Fun</option><option value="salary">Salary</option><option value="business">Business</option><option value="gift">Gift</option><option value="other">Other</option></select><input id="person" class="hidden" placeholder="Person name"><input id="note" placeholder="Note optional"><input id="date" type="date" value="${today()}"><button class="primary">Save</button></form></div></section>`;let type='income';document.querySelectorAll('#txForm [data-type]').forEach(b=>b.onclick=()=>{type=b.dataset.type;document.querySelectorAll('#txForm [data-type]').forEach(x=>x.classList.toggle('active',x===b));$('#person').classList.toggle('hidden',!(type==='lent'||type==='borrowed'))});$('#txForm').onsubmit=e=>{e.preventDefault();let amount=+$('#amount').value;if(type==='lent'||type==='borrowed'){state.loans.unshift({id:uid(),kind:type,person:$('#person').value||'Someone',amount,paid:0,note:$('#note').value,date:$('#date').value,created:Date.now()})}else{state.transactions.unshift({id:uid(),type,amount,category:$('#category').value,note:$('#note').value,date:$('#date').value,created:Date.now()})}toast('Saved');save();setTab('home')}}
function renderLoans(){let html=state.loans.map(l=>{let rem=Math.max(0,l.amount-l.paid),p=Math.min(100,(l.paid/l.amount)*100||0);return `<div class="row"><div class="icon">${l.kind==='lent'?'🤝':'💸'}</div><div class="grow"><b>${l.person}</b><div class="small">${l.kind==='lent'?'You lent':'You borrowed'} ${fmt(l.amount)} • remaining ${fmt(rem)}</div><div class="bar"><span style="width:${p}%"></span></div></div><button class="linkbtn" onclick="payLoan('${l.id}')">Pay</button><button class="linkbtn" onclick="delLoan('${l.id}')">✕</button></div>`}).join('');$('#view-loans').innerHTML=`<section class="section"><h2>Loans</h2><div class="card">${html||'<div class="empty">No loans yet.</div>'}</div></section>`}
window.payLoan=id=>{let l=state.loans.find(x=>x.id===id);let n=+prompt('Payment amount',Math.max(0,l.amount-l.paid));if(n>0){l.paid=Math.min(l.amount,(+l.paid||0)+n);save()}};window.delLoan=id=>{if(confirm('Delete this loan?')){state.loans=state.loans.filter(x=>x.id!==id);save()}}
function renderReports(t){let cats={};state.transactions.filter(x=>x.type==='expense').forEach(x=>cats[x.category]=(cats[x.category]||0)+ +x.amount);let rows=Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`<div class="row"><div class="icon">${icon(c)}</div><div class="grow"><b>${c}</b><div class="bar"><span style="width:${Math.min(100,a/(t.expense||1)*100)}%"></span></div></div><div class="money red">${fmt(a)}</div></div>`).join('');$('#view-reports').innerHTML=`<div class="grid"><div class="stat"><b>${fmt(t.balance)}</b><span>Balance</span></div><div class="stat"><b>${state.transactions.length}</b><span>Entries</span></div><div class="stat"><b>${state.loans.length}</b><span>Loans</span></div></div><section class="section"><h2>Spending by category</h2><div class="card">${rows||'<div class="empty">No expense data yet.</div>'}</div></section><section class="section"><div class="mini"><button class="ghost" onclick="exportData()">Export backup</button><button class="danger" onclick="resetData()">Reset</button></div></section>`}
window.exportData=()=>{let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='moneyflow-backup.json';a.click()};window.resetData=()=>{if(confirm('Delete all data?')){state={currency:state.currency,transactions:[],loans:[]};save()}}
render();
</script>
</body>
</html>
